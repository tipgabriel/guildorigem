<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - AQW Comunidade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aqw-dark': '#1a202c',
                        'aqw-gold': '#ffcc00',
                        'aqw-red': '#cc0000',
                        'aqw-blue': '#007bff',
                        'aqw-light-gray': '#e2e8f0',
                    }
                }
            }
        }
    </script>
     <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Página de Registro da Comunidade AdventureQuest Worlds BR",
      "url": "https://www.suacomunidadeaqw.com/signup.html",
      "description": "Crie sua conta na comunidade de AdventureQuest Worlds BR e junte-se aos heróis!"
    }
    </script>
</head>
<body class="bg-aqw-dark text-aqw-light-gray font-sans antialiased flex flex-col min-h-screen">

    <nav class="bg-aqw-dark p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-aqw-gold hover:text-aqw-red transition duration-300">AQW Community</a>
            <div class="space-x-4">
                <a href="index.html" class="text-aqw-light-gray hover:text-aqw-gold transition duration-300">Início</a>

                <a href="interaction.html" class="text-aqw-light-gray hover:text-aqw-gold transition duration-300">Interação</a>
                <a href="login.html" class="bg-aqw-blue px-4 py-2 rounded-md hover:bg-blue-600 transition duration-300">Login</a>
                <a href="signup.html" class="bg-aqw-gold text-aqw-dark px-4 py-2 rounded-md hover:bg-yellow-600 transition duration-300">Criar Conta</a>
            </div>
        </div>
    </nav>

            <h1 class="text-4xl font-bold text-aqw-gold mb-8">Crie Sua Conta de Herói!</h1>

                </div>
                <div class="mb-6 text-left">
                    <label for="email-signup" class="block text-aqw-light-gray text-lg font-medium mb-2">Email:</label>

                </div>
                <div class="mb-6 text-left">
                    <label for="password-signup" class="block text-aqw-light-gray text-lg font-medium mb-2">Senha:</label>
